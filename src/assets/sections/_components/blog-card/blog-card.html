<article class="blog-card">
	<a href="/blog-single.html" class="blog-card__link">
		<div class="blog-card__wrapper">
			<div class="blog-card__media">
				<img src="@@image" alt="" class="blog-card__img">
			</div>
			<div class="blog-card__content">
				<p class=" font-medium blog-card__title">
					@@text
				</p>
				<div class="body-text-md font-medium text-grey blog-card__date">@@date</div>

			</div>
		</div>
	</a>
</article>
