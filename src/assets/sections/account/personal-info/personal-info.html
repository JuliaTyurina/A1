<div class="personal-info">
	<div class="personal-info__section">
		<h2 class="title-lg font-semibold">Мои данные</h2>
		<div class="personal-info__inputs">
			<div class="input main-input">
				<div class="input-wrapper">
					<input id="surname" class="input-elem" name="surname" type="text" placeholder="Фамилия"
						   value=""/>
					<label for="surname" class="input-label" data-content="Фамилия"></label>
				</div>
			</div>
			<div class="input main-input">
				<div class="input-wrapper">
					<input id="name" class="input-elem" name="name" type="text" placeholder="Введите ваше имя"
						   value=""/>
					<label for="name" class="input-label" data-content="Имя"></label>
				</div>
			</div>
			<div class="input main-input">
				<div class="input-wrapper">
					<input id="phone" class="input-elem" name="phone" type="tel" placeholder="Номер телефона"
						   value=""/>
					<label for="phone" class="input-label" data-content="Номер телефона"></label>
				</div>
			</div>
			<div class="input main-input">
				<div class="input-wrapper">
					<input id="email" class="input-elem" name="email" type="email" placeholder="Почта" value=""/>
					<label for="email" class="input-label" data-content="Почта"></label>
				</div>
			</div>
			<div class="input main-input">
				<div class="input-wrapper">
					<input id="birth" class="input-elem" name="birth" type="date" placeholder="Дата рождения"
						   value="1900-07-01"/>
					<label for="birth" class="input-label" data-content="Дата рождения"></label>
				</div>
			</div>
			<div class="select">
				<div class="select-wrapper">
					<select id="gender" class="select-elem" name="gender" required>
						<!--								<option value="" disabled selected></option>-->
						<option value="female" selected>Женский</option>
						<option value="male">Мужской</option>
					</select>
					<label for="gender" class="select-label" data-content="Пол"></label>

					<span class="select-arrow">
								<svg aria-hidden="true">
								<use href="./assets/img/svg/sprite.svg#chevron-down"></use>
							</svg>
							</span>

				</div>
			</div>
		</div>

	</div>
	<div class="personal-info__section">
		<h2 class="title-lg font-semibold">Размер</h2>
		<div class="personal-info__inputs">
			<div class="input main-input">
				<div class="input-wrapper">
					<input id="height" class="input-elem" name="height" type="number" placeholder="Рост" value=""/>
					<label for="height" class="input-label" data-content="Рост"></label>
				</div>
			</div>
			<div class="input main-input">
				<div class="input-wrapper">
					<input id="chest" class="input-elem" name="chest" type="number" placeholder="Ваш обхват груди"
						   value=""/>
					<label for="chest" class="input-label" data-content="Ваш обхват груди"></label>
				</div>
			</div>
			<div class="input main-input">
				<div class="input-wrapper">
					<input id="waist" class="input-elem" name="waist" type="number" placeholder="Ваш обхват талии"
						   value=""/>
					<label for="waist" class="input-label" data-content="Ваш обхват талии"></label>
				</div>
			</div>
			<div class="input main-input">
				<div class="input-wrapper">
					<input id="hip" class="input-elem" name="hip" type="number" placeholder="Ваш обхват бедер"
						   value=""/>
					<label for="hip" class="input-label" data-content="Ваш обхват бедер"></label>
				</div>
			</div>
		</div>

	</div>
	<div class="personal-info__section">
		<h2 class="title-lg font-semibold">Доставка</h2>
		<div class="personal-info__inputs">
			<div class="input main-input">
				<div class="input-wrapper">
					<input id="country" class="input-elem" name="country" type="text" placeholder="Страна"
						   value=""/>
					<label for="country" class="input-label" data-content="Страна"></label>
				</div>
			</div>
			<div class="input main-input">
				<div class="input-wrapper">
					<input id="city" class="input-elem" name="city" type="text"
						   placeholder="Введите название города" value=""/>
					<label for="city" class="input-label" data-content="Населенный пункт"></label>
				</div>
			</div>
			<div class="input main-input">
				<div class="input-wrapper">
					<input id="street" class="input-elem" name="street" type="text" placeholder="Улица" value=""/>
					<label for="street" class="input-label" data-content="Улица"></label>
				</div>
			</div>
			<div class="half input main-input">
				<div class="input-wrapper">
					<input id="appart" class="input-elem" name="appart" type="number" placeholder="Дом" value=""/>
					<label for="appart" class="input-label" data-content="Дом"></label>
				</div>
			</div>
			<div class="half input main-input">
				<div class="input-wrapper">
					<input id="appart-number" class="input-elem" name="appart-number" type="number"
						   placeholder="Квартира" value=""/>
					<label for="appart-number" class="input-label" data-content="Квартира"></label>
				</div>
			</div>
			<div class="input main-input">
				<div class="input-wrapper">
					<input id="intercom" class="input-elem" name="intercom" type="number" placeholder="Домофон"
						   value=""/>
					<label for="intercom" class="input-label" data-content="Домофон"></label>
				</div>
			</div>
		</div>
	</div>
	<div class="personal-info__section">
		<h2 class="title-lg font-semibold">Сменить пароль</h2>
		<div class="personal-info__inputs">
			<div class="input main-input ">
				<div class="input-wrapper">
					<input id="password" class="input-elem" name="password" type="password"
						   placeholder="Введите свой пароль"/>
					<label for="password" class="input-label" data-content="Ваш пароль"></label>
				</div>
			</div>
			<div class="input main-input danger">
				<div class="input-wrapper">
					<input id="password" class="input-elem" name="password" type="password"
						   placeholder="Введите новый пароль"/>
					<label for="password" class="input-label" data-content="Новый пароль"></label>
				</div>
				<div class="input-hint">
					<svg class="input-icon input-icon--hint" aria-hidden="true">
						<use href="./assets/img/svg/sprite.svg#error-circle-fill"></use>
					</svg>
					<span>Неверный пароль</span>
				</div>
			</div>
			<div class="input main-input success">
				<div class="input-wrapper">
					<input id="password" class="input-elem" name="password" type="password"
						   placeholder="Повторить новый пароль"/>
					<label for="password" class="input-label" data-content="Повтор пароля"></label>
				</div>
				<div class="input-hint">
					<svg class="input-icon input-icon--hint" aria-hidden="true">
						<use href="./assets/img/svg/sprite.svg#check-circle-fill"></use>
					</svg>
					<span>Запросить следующий код возможно через 14 секунд</span>
				</div>
			</div>


		</div>
	</div>
	<div class="personal-info__section">
		<button class="button-lg button-primary">Сохранить</button>
	</div>
</div>
